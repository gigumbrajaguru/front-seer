<div class="app-shell">
  <app-top-nav />

  <div class="app-main">
    <router-outlet />
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo"><span class="footer-mark">✦</span> Seer.</span>
        <p class="footer-tagline">Ancient wisdom, modern clarity — guidance for every path.</p>
      </div>

      <nav class="footer-col" aria-label="Services">
        <span class="footer-heading">Services</span>
        <a routerLink="/reading">Oracle Readings</a>
        <a routerLink="/services">Palmistry <span class="soon-tag">Soon</span></a>
        <a routerLink="/services">Cosmic Dating <span class="soon-tag">Soon</span></a>
        <a routerLink="/services">All services</a>
      </nav>

      <nav class="footer-col" aria-label="Account">
        <span class="footer-heading">Account</span>
        <a routerLink="/profile">Profile</a>
        <a routerLink="/settings">Settings</a>
        <a routerLink="/settings" [queryParams]="{ section: 'billing' }">Billing &amp; plans</a>
      </nav>

      <nav class="footer-col" aria-label="Company">
        <span class="footer-heading">Company</span>
        <a href="https://myseer.xyz/" target="_blank" rel="noopener">Home</a>
        <a routerLink="/privacy">Privacy Policy</a>
        <a routerLink="/terms">Terms of Service</a>
      </nav>
    </div>

    <div class="footer-base">
      <span class="brand">myseer.xyz</span>
      <span class="footer-copy">© {{ year }} Seer. All rights reserved.</span>
    </div>
  </footer>
</div>
