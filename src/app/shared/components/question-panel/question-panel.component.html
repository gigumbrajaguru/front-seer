<div class="question-panel">
  <div class="panel-header">
    <h3>Your Question for the Oracle</h3>
    <span class="required-tag">required</span>
  </div>

  <textarea
    class="question-input"
    placeholder="What weighs on your mind — love, purpose, a crossroads, a fear? Speak it plainly and the oracle listens..."
    [(ngModel)]="question"
    (ngModelChange)="onQuestionChange()"
    rows="3"
    maxlength="1000"
  ></textarea>

  <p class="upload-hint">Add a journal entry, letter, or background — the oracle absorbs what you share.</p>

  <div class="upload-zone"
    [class.drag-over]="isDragOver"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)">

    @if (!fileName) {
      <label class="upload-label" for="file-input">
        <span class="upload-icon">📄</span>
        <span>Drop a .txt file here or <span class="browse-link">browse</span></span>
      </label>
      <input
        id="file-input"
        type="file"
        accept=".txt"
        (change)="onFileSelect($event)"
        class="file-input"
      />
    } @else {
      <div class="file-loaded">
        <span class="file-icon">📝</span>
        <span class="file-name">{{ fileName }}</span>
        <button class="clear-file" (click)="clearFile()" aria-label="Remove file">✕</button>
      </div>
    }
  </div>

  @if (fileError) {
    <p class="file-error">{{ fileError }}</p>
  }
</div>
