<div class="system-selector">
  <h3 class="selector-label">Choose Your Oracle</h3>
  <div class="systems-grid">
    @for (sys of systems; track sys.key) {
      <button
        class="system-btn"
        [class.active]="selected() === sys.key"
        (click)="select(sys.key)"
        [attr.aria-pressed]="selected() === sys.key"
      >
        <span class="sys-icon">{{ sys.icon }}</span>
        <span class="sys-name">{{ sys.label }}</span>
        <span class="sys-count">{{ sys.count }} cards</span>
      </button>
    }
  </div>
</div>
