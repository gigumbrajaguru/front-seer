<div class="system-selector">
  <h3 class="selector-label">Choose Your Oracles</h3>
  <p class="selector-hint">Select one or more oracles to consult</p>
  <div class="selector-legend" aria-hidden="true">
    <span class="legend-chip selected">Selected</span>
    <span class="legend-chip suggested">Suggested</span>
  </div>
  <div class="systems-grid">
    @for (sys of systems; track sys.key; let itemIndex = $index) {
      <button
        class="system-btn"
        [class.active]="isSelected(sys.key)"
        [class.suggested]="isSuggested(sys.key)"
        [style.--item-index]="itemIndex"
        (click)="toggle(sys.key)"
        [attr.aria-pressed]="isSelected(sys.key)"
        [attr.title]="isSuggested(sys.key) ? suggestionLabel(sys.key) : null"
      >
        <span class="check-mark">✓</span>
        @if (isSuggested(sys.key)) {
          <span class="suggestion-mark">Suggested</span>
        }
        <span class="sys-icon">{{ sys.icon }}</span>
        <span class="sys-name">{{ sys.label }}</span>
        <span class="sys-count">{{ sys.count }} cards</span>
      </button>
    }
  </div>
</div>
