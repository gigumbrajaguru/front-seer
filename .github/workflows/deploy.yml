name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/add-google-auth-users-4rn3A

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build -- --configuration production --base-href "/front-seer/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/front-seer/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
